name: Validate Shell Scripts

on:
  push:
  pull_request:

jobs:
  ubuntu-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck dash jq

      - name: Lint scripts
        run: shellcheck -s sh system-info.sh install-system-info.sh tests/*.sh

      - name: Run POSIX smoke tests
        run: dash tests/run-posix-suite.sh dash

  container-validation:
    runs-on: ubuntu-latest
    name: container-validation (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian
            image: debian:stable-slim
            setup: apt-get update && apt-get install -y shellcheck dash jq
          - name: alpine
            image: alpine:3.20
            setup: apk add --no-cache shellcheck dash jq

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate in ${{ matrix.name }}
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo "${{ matrix.image }}" sh -c '${{ matrix.setup }} && shellcheck -s sh system-info.sh install-system-info.sh tests/*.sh && dash tests/run-posix-suite.sh dash'

  macos-validation:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation tools
        run: brew install shellcheck jq

      - name: Lint scripts
        run: shellcheck -s sh system-info.sh install-system-info.sh tests/*.sh

      - name: Run POSIX smoke tests
        run: |
          /bin/sh tests/run-posix-suite.sh /bin/sh
